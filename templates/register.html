<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register – betPawa</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .logo{font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:700;color:white;margin-bottom:28px}
    .logo span{color:#a8ff00}
    .card{background:white;border-radius:12px;padding:24px;width:100%;max-width:380px}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:.8rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
    input{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.95rem;font-family:'Nunito',sans-serif}
    input:focus{outline:none;border-color:#a8ff00}
    .btn{width:100%;background:#a8ff00;color:#111;border:none;padding:13px;border-radius:8px;font-weight:800;font-size:1rem;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:4px}
    .alert{padding:10px;border-radius:8px;font-size:.88rem;margin-bottom:14px;font-weight:600}
    .alert-danger{background:rgba(229,57,53,.1);color:#c62828;border:1px solid rgba(229,57,53,.3)}
    .link{color:#a8ff00;font-weight:700;text-decoration:none}
    p{text-align:center;margin-top:16px;font-size:.88rem;color:#666}
    .promo{background:rgba(168,255,0,.12);border:1px solid rgba(168,255,0,.3);border-radius:8px;padding:12px;margin-bottom:18px;text-align:center;font-size:.85rem;color:#2d6a00;font-weight:700}
  </style>
</head>
<body>
  <div class="logo">bet<span>Pawa</span></div>
  <div class="card">
    <div class="promo">🎁 Join now & start betting on Virtual Sports!</div>
    <h2 style="margin-bottom:18px;font-size:1.3rem">Create Account</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="e.g. 0712345678" required autofocus>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 6 characters" required>
      </div>
      <button type="submit" class="btn">JOIN NOW</button>
    </form>
    <p>Already have account? <a href="/login" class="link">Login →</a></p>
  </div>
</body>
</html>
